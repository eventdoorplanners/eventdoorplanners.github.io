<!DOCTYPE html>
<html lang="en">
<head>
    <title>Eventdoor Planners - Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Golden & White Minimalist Theme */
        :root {
            --gold: #D4AF37; /* Classic Metallic Gold */
            --soft-white: #ffffff;
            --off-white: #fcfcfc;
            --text-dark: #2d2d2d;
        }

        body {
            margin: 0;
            padding-top: 80px;
            background-color: var(--soft-white);
            font-family: 'Montserrat', sans-serif; /* Clean minimalist font */
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.98);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            box-sizing: border-box;
            border-bottom: 1px solid #f0f0f0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 50px;
            width: auto;
            /* Filter can subtly adjust the logo's appearance if needed */
        }

        .business-name {
            font-weight: 300; /* Light weight for minimalism */
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Gold underline effect on hover */
        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -5px;
            left: 0;
            background-color: var(--gold);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--gold);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Special styling for the CTA link */
        .plan-event-btn {
            border: 1px solid var(--gold);
            padding: 10px 20px;
            border-radius: 2px;
            color: var(--gold) !important;
        }

        .plan-event-btn:hover {
            background-color: var(--gold);
            color: white !important;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <img src="Logo.jpeg" alt="Eventdoor Planners Logo" class="logo">
        <span class="business-name">Eventdoor Planners</span>
    </div>
    
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#contact" class="plan-event-btn">Plan Event</a></li>
        </ul>
    </nav>
</header>

</body>
</html>
